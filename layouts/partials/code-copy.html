<style>
  article.prose pre { position: relative; }
  article.prose pre .code-copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    padding: 0.25rem 0.5rem;
    font-size: 0.75rem;
    line-height: 1;
    border-radius: 0.25rem;
    background: rgba(255, 255, 255, 0.12);
    color: inherit;
    border: 1px solid rgba(127, 127, 127, 0.35);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s ease;
    font-family: inherit;
  }
  article.prose pre:hover .code-copy-btn,
  article.prose pre:focus-within .code-copy-btn,
  article.prose pre .code-copy-btn:focus { opacity: 1; }
  article.prose pre .code-copy-btn:hover { background: rgba(255, 255, 255, 0.22); }
  article.prose pre .code-copy-btn.is-copied { background: rgba(34, 197, 94, 0.25); border-color: rgba(34, 197, 94, 0.5); }
</style>
<script>
(function () {
  document.addEventListener('DOMContentLoaded', function () {
    var pres = document.querySelectorAll('article.prose pre');
    pres.forEach(function (pre) {
      if (pre.querySelector('.code-copy-btn')) return;
      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.setAttribute('aria-label', 'Copy code to clipboard');
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var code = pre.querySelector('code');
        var text = code ? code.innerText : pre.innerText;
        text = text.replace(/\n?Copy$/, '');
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            btn.textContent = 'Copied';
            btn.classList.add('is-copied');
            setTimeout(function () {
              btn.textContent = 'Copy';
              btn.classList.remove('is-copied');
            }, 1500);
          }).catch(function () {
            btn.textContent = 'Error';
            setTimeout(function () { btn.textContent = 'Copy'; }, 1500);
          });
        }
      });
      pre.appendChild(btn);
    });
  });
})();
</script>
